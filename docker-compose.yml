version: '3.8'
services:
  db:
    image: postgres:15
    container_name: portal_projetos_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portal_projetos
    ports:
      - "5432:5432"
    volumes:
      - portal_projetos_data:/var/lib/postgresql/data
volumes:
  portal_projetos_data:
