<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal 5W2H</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-main);
            overflow: hidden;
            position: relative;
        }

        /* Abstract glowing background effect */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-blue), #60a5fa);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .login-header h1 {
            font-size: 1.5rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .login-header p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            width: 18px;
            height: 18px;
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 12px 12px 40px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        .demo-credentials {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .demo-credentials p { margin-bottom: 5px; }
    </style>
</head>
<body class="dark-theme">

    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i data-lucide="kanban-square"></i>
            </div>
            <h1>Portal 5W2H</h1>
            <p>Faça login para acessar seus projetos</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <div class="input-wrapper">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                Entrar <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>

            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="demo-credentials">
            <p><strong>Credenciais para Teste (Senha: 123456)</strong></p>
            <p>admin@portal.com | gestor@portal.com | analista@portal.com</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');

            btn.innerHTML = 'Autenticando...';
            btn.disabled = true;
            errorDiv.textContent = '';

            try {
                // Tentando conectar na API local
                const response = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Salva o token no localStorage
                    localStorage.setItem('portal_token', data.token);
                    localStorage.setItem('portal_user', JSON.stringify(data.user));
                    
                    // Redireciona para o sistema
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = 'E-mail ou senha incorretos.';
                    btn.innerHTML = 'Entrar <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>';
                    lucide.createIcons();
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Erro ao conectar ao servidor. Verifique se a API está rodando na porta 5001.';
                btn.innerHTML = 'Entrar <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>';
                lucide.createIcons();
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
